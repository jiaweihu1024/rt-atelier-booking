        @layer utilities {

    <script>
        // ==================== 辅助函数 ====================
        function getLocalDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 应用数据（同上）

        // 改进的预订筛选函数
        function filterBookings(status) {
            const todayString = getLocalDateString(appData.today);
            
            // 更新标签样式
            elements.bookingTabs.forEach(tab => {
                if (tab.getAttribute('data-status') === status) {
                    tab.classList.add('border-secondary', 'text-secondary');
                    tab.classList.remove('border-transparent', 'text-gray-500');
                } else {
                    tab.classList.remove('border-secondary', 'text-secondary');
                    tab.classList.add('border-transparent', 'text-gray-500');
                }
            });
            
            // 筛选当前用户的预订
            let filteredBookings = appData.bookings.filter(b => b.userId === appData.currentUserId);
            
            if (status === 'upcoming') {
                filteredBookings = filteredBookings.filter(booking => 
                    booking.date >= todayString && booking.status !== 'cancelled'
                );
            } else if (status === 'past') {
                filteredBookings = filteredBookings.filter(booking => 
                    booking.date < todayString && booking.status !== 'cancelled'
                );
            } else if (status === 'cancelled') {
                filteredBookings = filteredBookings.filter(booking => booking.status === 'cancelled');
            }
            
            // 排序
            filteredBookings.sort((a, b) => {
                if (status === 'upcoming') {
                    return new Date(a.date) - new Date(b.date);
                } else {
                    return new Date(b.date) - new Date(a.date);
                }
            });
            
            renderBookingsList(filteredBookings);
        }

        function renderBookings() {
            filterBookings('upcoming');
        }

        function renderBookingsList(bookings) {
            // 原有实现，注意日期解析已使用 T12:00:00

        function confirmAction(bookingId, action) {
            appData.selectedBookingId = bookingId;
            appData.selectedAction = action;
            // ... 设置确认框文字
            elements.confirmModal.classList.remove('hidden');
        }

        function closeConfirmModal() {
            elements.confirmModal.classList.add('hidden');
        }

        // 核心改进：执行确认操作后强制刷新老师汇总，并刷新当前页面
        function executeConfirmAction() {
            const bookingId = appData.selectedBookingId;
            const action = appData.selectedAction;
            
            const bookingIndex = appData.bookings.findIndex(b => b.id === bookingId);
            if (bookingIndex !== -1) {
                if (action === 'cancel') {
                    appData.bookings[bookingIndex].status = 'cancelled';
                    showSuccessMessage(translations[appData.currentLanguage]['success.cancel']);
                } else if (action === 'leave') {
                    appData.bookings[bookingIndex].status = 'leave';
                    showSuccessMessage(translations[appData.currentLanguage]['success.leave']);
                }
                
                // 刷新当前页面（根据当前所在页面）
                if (appData.currentPage === 'calendar-page') {
                    renderCalendar();
                } else if (appData.currentPage === 'courses-page') {
                    renderCourses();
                } else if (appData.currentPage === 'bookings-page') {
                    // 重新获取当前标签页状态并刷新
                    const activeTab = document.querySelector('.booking-tab.border-secondary');
                    const status = activeTab ? activeTab.dataset.status : 'upcoming';
                    filterBookings(status);
                }
                
                // 强制刷新老师汇总页面（即使隐藏）
                renderTeacherSummary();
            }
            
            closeConfirmModal();
        }
