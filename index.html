<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT Atelier - 舞蹈课程预订</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A1A38', // 深蓝色
                        secondary: '#D4AF37', // 金色
                        accent: '#4A90E2', // 浅蓝色
                        success: '#27AE60', // 绿色
                        danger: '#E74C3C', // 红色
                        gray: {
                            light: '#F8F9FA',
                            medium: '#95A5A6',
                            dark: '#333333'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b39020;
        }
        
        /* 页面过渡动画 */
        .page-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .page-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        .page-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 日历样式 */
        .calendar-day {
            min-height: 100px;
            transition: all 0.2s ease;
        }
        .calendar-day:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }
        .calendar-day.today {
            border: 2px solid #D4AF37;
        }
        .calendar-day.has-event {
            position: relative;
        }
        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #D4AF37;
        }
        
        /* 课程卡片样式 */
        .course-card {
            transition: all 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--tw-shadow-card-hover);
        }
        
        /* 按钮样式 */
        .btn-primary {
            @apply bg-primary text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-all-300;
        }
        .btn-secondary {
            @apply bg-secondary text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-all-300;
        }
        .btn-accent {
            @apply bg-accent text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-all-300;
        }
        .btn-success {
            @apply bg-success text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-all-300;
        }
        .btn-danger {
            @apply bg-danger text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-all-300;
        }
    </style>
</head>
<body class="bg-gray-light min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-primary text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/8826078d8b784cd8b0f02cd24b48e9b9.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=2026031814164451A34FA1AA0C5668D71A&rrcfp=8a172a1a&x-expires=1774419404&x-signature=KfGqcLbdk2wHxCiUzd6e0HE5kSo%3D" 
                     alt="RT Atelier Logo"

                <ul class="flex space-x-6 overflow-x-auto">
                    <li>
                        <a href="#" class="nav-link block py-3 px-2 text-secondary border-b-2 border-secondary" data-page="calendar" data-i18n="nav.calendar">日历视图</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link block py-3 px-2 text-white hover:text-secondary transition-all-300" data-page="courses" data-i18n="nav.courses">课程列表</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link block py-3 px-2 text-white hover:text-secondary transition-all-300" data-page="bookings" data-i18n="nav.myBookings">我的预订</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link block py-3 px-2 text-white hover:text-secondary transition-all-300" data-page="settings" data-i18n="nav.settings">设置</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link block py-3 px-2 text-white hover:text-secondary transition-all-300" data-page="teacher-summary-page" data-i18n="nav.teacherSummary">老师汇总</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主内容区域 -->
    <main class="flex-grow container mx-auto px-4 py-6">
        <!-- 日历视图页面 -->
        <section id="calendar-page" class="page-content page-transition">

                    <button id="add-booking-btn" class="btn-primary flex items-center">
                        <i class="fa fa-plus mr-1"></i>
                        <span data-i18n="calendar.addBooking">新增预订</span>
                    </button>
                </div>
            </div>

            <!-- 日历控件 -->
            <div class="bg-white rounded-lg shadow-card p-4 mb-6">

                </div>
                
                <!-- 星期标题 -->

                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.monday">一</div>
                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.tuesday">二</div>
                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.wednesday">三</div>
                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.thursday">四</div>
                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.friday">五</div>
                    <div class="text-center py-2 font-medium text-gray-dark" data-i18n="calendar.saturday">六</div>
                </div>
                
                <!-- 日历网格 -->
                <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                    <!-- 日历天数将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <!-- 今日课程概览 -->
            <div class="bg-white rounded-lg shadow-card p-4">
                <h3 class="text-xl font-semibold text-primary mb-4" data-i18n="calendar.todayCourses">今日课程</h3>
                <div id="today-courses" class="space-y-3">
                    <!-- 今日课程将通过JavaScript动态生成 -->
                </div>
            </div>
        </section>

        <!-- 课程列表页面 -->
        <section id="courses-page" class="page-content page-transition hidden">
            <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-2xl font-bold text-primary" data-i18n="courses.title">课程列表</h2>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="text" id="courses-search" placeholder="搜索课程..." class="pl-8 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary">
                        <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                    <select id="course-filter" class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-secondary">
                        <option value="all" data-i18n="courses.filter.all">所有课程</option>
                        <option value="latin" data-i18n="courses.filter.latin">拉丁舞</option>
                    </select>
                </div>
            </div>

            <!-- 课程卡片网格 -->
            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 课程卡片将通过JavaScript动态生成 -->
            </div>
        </section>

        <!-- 我的预订页面 -->
        <section id="bookings-page" class="page-content page-transition hidden">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-primary" data-i18n="bookings.title">我的预订</h2>
            </div>

            <!-- 预订状态标签 -->
            <div class="flex border-b mb-6 overflow-x-auto">

                <button class="booking-tab py-2 px-4 border-b-2 border-transparent text-gray-500 hover:text-secondary" data-status="cancelled">
                    <span data-i18n="bookings.cancelled">已取消</span>

            </div>

            <!-- 预订列表 -->
            <div id="bookings-list" class="space-y-4">
                <!-- 预订项目将通过JavaScript动态生成 -->
            </div>
        </section>

        <!-- 设置页面 -->
        <section id="settings-page" class="page-content page-transition hidden">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-primary" data-i18n="settings.title">设置</h2>
            </div>

            <div class="bg-white rounded-lg shadow-card p-6">
                <h3 class="text-lg font-semibold text-primary mb-4" data-i18n="settings.profile">个人资料</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="settings.name">姓名</label>
                        <input type="text" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-secondary" value="张三">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="settings.email">电子邮箱</label>

                    <div>

                            <option value="zh-CN" data-i18n="settings.language.zhCN">简体中文</option>
                            <option value="zh-TW" data-i18n="settings.language.zhTW">繁体中文</option>

                </div>
                <div class="mt-6">

                <hr class="my-8 border-gray-200">

                <h3 class="text-lg font-semibold text-primary mb-4" data-i18n="settings.notifications">通知设置</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium" data-i18n="settings.notifications.courseReminder">课程提醒</p>

                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium" data-i18n="settings.notifications.newCourse">新课程通知</p>
                            <p class="text-sm text-gray-600" data-i18n="settings.notifications.newCourseDesc">当有新课程添加时收到通知</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium" data-i18n="settings.notifications.promotion">促销活动</p>
                            <p class="text-sm text-gray-600" data-i18n="settings.notifications.promotionDesc">接收关于课程优惠和活动的通知</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
                        </label>
                    </div>
                </div>
                <div class="mt-6">
                    <button id="save-notifications" class="btn-primary" data-i18n="settings.saveNotifications">保存通知设置</button>
                </div>
            </div>
        </section>

    <!-- 底部导航栏（移动端） -->

                        <span class="text-xs mt-1" data-i18n="nav.calendar">日历</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="footer-nav-link flex flex-col items-center py-1 text-gray-500" data-page="courses">

                <li>
                    <a href="#" class="footer-nav-link flex flex-col items-center py-1 text-gray-500" data-page="bookings">

                </li>
                <li>
                    <a href="#" class="footer-nav-link flex flex-col items-center py-1 text-gray-500" data-page="settings">

                        <span class="text-xs mt-1" data-i18n="nav.settings">设置</span>
                    </a>
                </li>
            </ul>
        </div>
    </footer>

    <!-- 预订模态框 -->
    <div id="booking-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4 transform transition-all">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="text-lg font-semibold text-primary" data-i18n="modal.booking.title">预订课程</h3>
                <button id="close-booking-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="p-4">
                <form id="booking-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="modal.booking.course">选择课程</label>
                        <select id="course-select" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-secondary">
                            <!-- 课程选项将通过JavaScript动态生成 -->
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="modal.booking.type">预订类型</label>
                        <div class="flex space-x-4">
                            <label class="flex items-center">
                                <input type="radio" name="booking-type" value="regular" checked class="mr-2">
                                <span data-i18n="modal.booking.regular">固定日程</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="booking-type" value="ad-hoc" class="mr-2">
                                <span data-i18n="modal.booking.adHoc">单次预订</span>
                            </label>
                        </div>
                    </div>
                    <div id="ad-hoc-date" class="mb-4 hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="modal.booking.date">选择日期</label>
                        <input type="date" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="modal.booking.notes">备注 (可选)</label>
                        <textarea class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-secondary" rows="3" placeholder="如有特殊需求请在此说明"></textarea>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" id="cancel-booking" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-100" data-i18n="modal.cancel">取消</button>
                        <button type="submit" class="btn-primary" data-i18n="modal.booking.confirm">确认预订</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 确认消息模态框 -->
    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-sm mx-4">
            <div class="p-4 border-b">
                <h3 class="text-lg font-semibold text-primary" id="confirm-title">确认操作</h3>
            </div>
            <div class="p-4">
                <p id="confirm-message">您确定要执行此操作吗？</p>

            // 点击页面其他地方关闭语言下拉框

        // 导航到指定页面
        function navigateToPage(page) {
            // 更新当前页面
            currentPage = page;
            
            // 更新导航链接样式
            navLinks.forEach(link => {
                if (link.getAttribute('data-page') === page) {
                    link.classList.add('text-secondary', 'border-secondary');
                    link.classList.remove('text-white', 'text-gray-500', 'border-transparent');
                } else {
                    link.classList.remove('text-secondary', 'border-secondary');
                    if (link.classList.contains('nav-link')) {
                        link.classList.add('text-white', 'hover:text-secondary');
                    } else {
                        link.classList.add('text-gray-500');
                    }
                }
            });
            
            // 显示对应页面内容
            pageContents.forEach(content => {
                if (content.id === `${page}-page`) {
                    content.classList.remove('hidden');
                    // 添加页面进入动画
                    content.classList.add('page-enter');
                    setTimeout(() => {
                        content.classList.add('page-enter-active');
                    }, 10);
                    setTimeout(() => {
                        content.classList.remove('page-enter', 'page-enter-active');
                    }, 300);
                } else {
                    content.classList.add('hidden');
                }
            });
            
            // 根据页面执行特定操作
            if (page === 'calendar') {
                initCalendar();
            } else if (page === 'courses') {
                renderCourses();
            } else if (page === 'bookings') {
                filterBookings('upcoming');
            } else if (page === 'teacher-summary') {
                renderTeacherSummary();
            }
        }

        // 初始化日历
        function initCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const currentMonthElement = document.getElementById('current-month');
            
            // 设置当前月份显示
            const monthNames = [
                { 'zh-CN': '一月', 'zh-TW': '一月', 'en-US': 'January' },
                { 'zh-CN': '二月', 'zh-TW': '二月', 'en-US': 'February' },

                { 'zh-CN': '五月', 'zh-TW': '五月', 'en-US': 'May' },
                { 'zh-CN': '六月', 'zh-TW': '六月', 'en-US': 'June' },
                { 'zh-CN': '七月', 'zh-TW': '七月', 'en-US': 'July' },
                { 'zh-CN': '八月', 'zh-TW': '八月', 'en-US': 'August' },
                { 'zh-CN': '九月', 'zh-TW': '九月', 'en-US': 'September' },
                { 'zh-CN': '十月', 'zh-TW': '十月', 'en-US': 'October' },
                { 'zh-CN': '十一月', 'zh-TW': '十一月', 'en-US': 'November' },
                { 'zh-CN': '十二月', 'zh-TW': '十二月', 'en-US': 'December' }
            ];
            
            currentMonthElement.textContent = `${currentDate.getFullYear()}年${monthNames[currentDate.getMonth()][currentLanguage]}`;
            
            // 清空日历网格
            calendarGrid.innerHTML = '';
            
            // 获取当月第一天是星期几
            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            
            // 获取当月的天数
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            
            // 添加空白单元格（上个月的日期）
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day p-1 border bg-gray-50';
                calendarGrid.appendChild(emptyDay);
            }
            
            // 添加当月的日期单元格
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day p-1 border relative';
                
                // 检查是否是今天
                const isToday = today.getDate() === day && 
                                today.getMonth() === currentDate.getMonth() && 
                                today.getFullYear() === currentDate.getFullYear();
                
                if (isToday) {
                    dayElement.classList.add('today');
                }
                
                // 添加日期数字
                const dateNumber = document.createElement('div');
                dateNumber.className = 'text-right mb-1';
                dateNumber.textContent = day;
                dayElement.appendChild(dateNumber);
                
                // 添加当天的课程（只显示已预订的课程）
                const currentDateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                const dateString = currentDateObj.toISOString().split('T')[0]; // 格式：YYYY-MM-DD
                const dayOfWeek = currentDateObj.getDay(); // 0-6，表示周日到周六
                
                // 查找用户当天已预订的课程（只显示已确认和已请假的，不显示已取消的）
                const userBookingsForDay = bookings.filter(booking => {
                    // 检查日期是否匹配
                    if (booking.date === dateString && booking.status !== 'cancelled') {
                        // 检查课程是否在这一天有安排
                        const course = courses.find(c => c.id === booking.courseId);
                        return course && course.schedule.some(s => s.day === dayOfWeek);
                    }
                    return false;
                });
                
                if (userBookingsForDay.length > 0) {
                    dayElement.classList.add('has-event');
                    
                    // 添加课程列表
                    const coursesList = document.createElement('div');
                    coursesList.className = 'space-y-1';
                    
                    userBookingsForDay.forEach(booking => {
                        const course = courses.find(c => c.id === booking.courseId);
                        if (course) {
                            const courseItem = document.createElement('div');
                            
                            // 根据预订状态设置不同的样式
                            if (booking.status === 'leave') {
                                courseItem.className = 'text-xs p-1 rounded bg-yellow-100 text-yellow-800 truncate';
                            } else {
                                courseItem.className = 'text-xs p-1 rounded bg-secondary bg-opacity-10 text-secondary truncate';
                            }
                            
                            // 查找课程在这一天的具体时间
                            const dayOfWeek = currentDateObj.getDay();
                            const schedule = course.schedule.find(s => s.day === dayOfWeek);
                            const time = schedule ? schedule.time : '';
                            
                            courseItem.textContent = `${course.name[currentLanguage]} ${time}`;
                            coursesList.appendChild(courseItem);
                        }
                    });
                    
                    dayElement.appendChild(coursesList);
                }
                
                calendarGrid.appendChild(dayElement);
            }
            
            // 渲染今日课程
            renderTodayCourses();
        }

        // 筛选预订列表
        function filterBookings(status) {
            const bookingsList = document.getElementById('bookings-list');
            const todayString = today.toISOString().split('T')[0];
            
            // 更新标签样式
            bookingTabs.forEach(tab => {
                if (tab.getAttribute('data-status') === status) {
                    tab.classList.add('border-secondary', 'text-secondary');
                    tab.classList.remove('border-transparent', 'text-gray-500');
                } else {
                    tab.classList.remove('border-secondary', 'text-secondary');
                    tab.classList.add('border-transparent', 'text-gray-500');
                }
            });
            
            // 筛选预订
            let filteredBookings = [];
            
            if (status === 'upcoming') {
                filteredBookings = bookings.filter(booking => 
                    booking.date >= todayString && booking.status !== 'cancelled'
                );
            } else if (status === 'past') {
                filteredBookings = bookings.filter(booking => 
                    booking.date < todayString && booking.status !== 'cancelled'
                );
            } else if (status === 'cancelled') {
                filteredBookings = bookings.filter(booking => booking.status === 'cancelled');
            }
            
            // 按日期排序
            filteredBookings.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (filteredBookings.length === 0) {
                bookingsList.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-calendar-o text-3xl mb-2"></i>
                        <p>${translations[currentLanguage]['bookings.noBookings']}</p>
                    </div>
                `;
                return;
            }
            
            // 渲染预订列表
            bookingsList.innerHTML = '';
            filteredBookings.forEach(booking => {
                const course = courses.find(c => c.id === booking.courseId);
                if (course) {
                    const bookingItem = document.createElement('div');
                    bookingItem.className = 'booking-item bg-white rounded-lg shadow-card p-4';
                    
                    // 格式化日期
                    const bookingDate = new Date(booking.date);
                    const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                    const dayNamesEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const dayNamesTw = ['周日', '週一', '週二', '週三', '週四', '週五', '週六'];
                    
                    let dayName;
                    if (currentLanguage === 'en-US') {
                        dayName = dayNamesEn[bookingDate.getDay()];
                    } else if (currentLanguage === 'zh-TW') {
                        dayName = dayNamesTw[bookingDate.getDay()];
                    } else {
                        dayName = dayNames[bookingDate.getDay()];
                    }
                    
                    const dateString = currentLanguage === 'en-US' 
                        ? `${bookingDate.getMonth() + 1}/${bookingDate.getDate()}/${bookingDate.getFullYear()} (${dayName})`
                        : `${bookingDate.getFullYear()}年${bookingDate.getMonth() + 1}月${bookingDate.getDate()}日 (${dayName})`;
                    
                    // 查找课程在这一天的具体时间
                    const dayOfWeek = bookingDate.getDay();
                    const schedule = course.schedule.find(s => s.day === dayOfWeek);
                    const time = schedule ? schedule.time : '';
                    
                    bookingItem.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-center justify-between">
                            <div>
                                <h3 class="text-lg font-semibold text-primary">${course.name[currentLanguage]}</h3>
                                <p class="text-sm text-gray-600">
                                    <i class="fa fa-calendar mr-1"></i> ${dateString} ${time}
                                </p>
                                <p class="text-sm text-gray-600">
                                    <i class="fa fa-user mr-1"></i> ${course.teacher}
                                </p>
                            </div>
                            <div class="mt-3 md:mt-0 flex flex-col sm:flex-row gap-2">
                                <span class="px-3 py-1 ${
                                    booking.status === 'confirmed' ? 'bg-green-100 text-green-800' : 
                                    booking.status === 'leave' ? 'bg-yellow-100 text-yellow-800' : 
                                    'bg-red-100 text-red-800'
                                } text-sm rounded-full self-start">
                                    <i class="fa fa-${
                                        booking.status === 'confirmed' ? 'check-circle' : 
                                        booking.status === 'leave' ? 'clock-o' : 
                                        'times-circle'
                                    } mr-1"></i> 
                                    ${
                                        booking.status === 'confirmed' ? translations[currentLanguage]['bookings.confirmed'] : 
                                        booking.status === 'leave' ? translations[currentLanguage]['bookings.leave'] : 
                                        translations[currentLanguage]['bookings.cancelled']
                                    }
                                </span>
                                ${booking.status !== 'cancelled' ? `
                                    <button class="btn-danger text-sm" onclick="confirmAction(${booking.id}, 'cancel')">
                                        <i class="fa fa-times mr-1"></i> ${translations[currentLanguage]['bookings.cancel']}
                                    </button>
                                    ${booking.status !== 'leave' ? `
                                        <button class="btn-secondary text-sm" onclick="confirmAction(${booking.id}, 'leave')">
                                            <i class="fa fa-calendar-minus-o mr-1"></i> ${translations[currentLanguage]['bookings.absent']}
                                        </button>
                                    ` : ''}
                                ` : ''}
                            </div>
                        </div>
                    `;
                    
                    bookingsList.appendChild(bookingItem);
                }
            });
        }

        // 填充课程选择下拉框
        function populateCourseSelect() {
            courseSelect.innerHTML = '';
            
            courses.forEach(course => {
                const option = document.createElement('option');
                option.value = course.id;
                option.textContent = course.name[currentLanguage];
                courseSelect.appendChild(option);
            });
        }

        // 打开预订模态框
        function openBookingModal(courseId = null) {
            // 如果指定了课程ID，则选择该课程
            if (courseId) {
                courseSelect.value = courseId;
            }
            
            // 重置表单
            document.getElementById('booking-form').reset();
            adHocDateDiv.classList.add('hidden');
            
            // 显示模态框
            bookingModal.classList.remove('hidden');
        }

        // 关闭预订模态框
        function closeBookingModalFunc() {
            bookingModal.classList.add('hidden');
        }

        // 提交预订表单
        function submitBooking() {
            // 获取表单数据
            const selectedCourseId = parseInt(courseSelect.value);
            const bookingType = document.querySelector('input[name="booking-type"]:checked').value;
            const adHocDate = adHocDateInput.value;
            
            // 验证日期
            let bookingDate = '';
            if (bookingType === 'ad-hoc') {
                if (!adHocDate) {
                    showSuccessMessage(translations[currentLanguage]['error.invalidDate']);
                    return;
                }
                bookingDate = adHocDate;
            } else {
                bookingDate = getNextCourseDate(selectedCourseId);
            }
            
            // 检查是否已经预订了该课程
            const alreadyBooked = bookings.some(booking => 
                booking.courseId === selectedCourseId && 
                booking.date === bookingDate && 
                booking.status !== 'cancelled'
            );
            
            if (alreadyBooked) {
                showSuccessMessage(translations[currentLanguage]['error.alreadyBooked']);
                return;
            }
            
            // 创建新的预订
            const newBooking = {
                id: bookings.length > 0 ? Math.max(...bookings.map(b => b.id)) + 1 : 1,
                userId: 'user123',
                courseId: selectedCourseId,
                date: bookingDate,
                type: bookingType,
                status: 'confirmed'
            };
            
            // 添加到预订列表
            bookings.push(newBooking);
            
            // 关闭模态框并显示成功消息
            closeBookingModalFunc();
            showSuccessMessage(translations[currentLanguage]['success.booking'] + '成功！');
            
            // 重新加载日历和预订列表
            initCalendar();
            if (currentPage === 'bookings') {
                filterBookings('upcoming');
            }
        }

        // 获取下一次课程的日期
        function getNextCourseDate(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course || course.schedule.length === 0) {
                return today.toISOString().split('T')[0];
            }
            
            // 使用全局的today变量，确保日期一致性
            let nextDate = null;
            
            // 查找下一个课程日期（包括今天）
            for (let i = 0; i < 7; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + i);
                const dayOfWeek = checkDate.getDay();
                
                if (course.schedule.some(s => s.day === dayOfWeek)) {
                    nextDate = checkDate;
                    break;
                }
            }
            
            return nextDate ? nextDate.toISOString().split('T')[0] : today.toISOString().split('T')[0];
        }

        // 确认操作
        function confirmAction(bookingId, action) {
            selectedBookingId = bookingId;
            currentAction = action;
            
            // 设置确认模态框内容
            if (action === 'cancel') {
                confirmTitle.textContent = translations[currentLanguage]['bookings.cancel'];
                confirmMessage.textContent = translations[currentLanguage]['modal.booking.title'] + '？';
            } else if (action === 'leave') {
                confirmTitle.textContent = translations[currentLanguage]['bookings.absent'];
                confirmMessage.textContent = translations[currentLanguage]['modal.booking.title'] + '？';
            }
            
            // 显示确认模态框
            confirmModal.classList.remove('hidden');
        }

        // 关闭确认模态框
        function closeConfirmModal() {
            confirmModal.classList.add('hidden');
            selectedBookingId = null;
            currentAction = '';
        }

        // 执行确认的操作
        function executeConfirmedAction() {
            if (!selectedBookingId || !currentAction) {
                closeConfirmModal();
                return;
            }
            
            const bookingIndex = bookings.findIndex(b => b.id === selectedBookingId);
            if (bookingIndex === -1) {
                closeConfirmModal();
                return;
            }
            
            if (currentAction === 'cancel') {
                bookings[bookingIndex].status = 'cancelled';
                showSuccessMessage(translations[currentLanguage]['success.cancel'] + '成功！');
            } else if (currentAction === 'leave') {
                bookings[bookingIndex].status = 'leave';
                showSuccessMessage(translations[currentLanguage]['success.leave'] + '成功！');
            }
            
            // 关闭确认模态框
            closeConfirmModal();
            
            // 重新加载日历和预订列表
            initCalendar();
            if (currentPage === 'bookings') {
                filterBookings('upcoming');
            }
        }

        // 显示成功消息
        function showSuccessMessage(message) {
            successText.textContent = message;
            successMessage.classList.remove('translate-x-full');
            
            setTimeout(() => {
                successMessage.classList.add('translate-x-full');
            }, 3000);
        }

        // 保存个人资料
        function saveProfile() {
            const userName = document.getElementById('user-name').value;
            if (userName.trim()) {
                // 更新用户信息
                bookings.forEach(booking => {
                    if (booking.userId === 'user123') {
                        booking.userName = userName;
                    }
                });
                showSuccessMessage(translations[currentLanguage]['success.update'] + '成功！');
            }
        }

        // 保存通知设置
        function saveNotifications() {
            showSuccessMessage(translations[currentLanguage]['success.update'] + '成功！');
        }

        // 渲染老师课程报名汇总
        function renderTeacherSummary() {
            const courseStatsContainer = document.getElementById('course-stats');
            const courseDetailsContainer = document.getElementById('course-details');
            
            // 清空容器
            courseStatsContainer.innerHTML = '';
            courseDetailsContainer.innerHTML = '';
            
            // 计算每个课程的报名统计
            courses.forEach(course => {
                // 查找该课程的所有有效报名（不包括已取消的）
                const courseBookings = bookings.filter(booking => 
                    booking.courseId === course.id && booking.status !== 'cancelled'
                );
                
                // 计算统计信息
                const totalCapacity = course.capacity;
                const bookedCount = courseBookings.length;
                const remainingCount = totalCapacity - bookedCount;
                
                // 渲染课程统计卡片
                const statsCard = document.createElement('div');
                statsCard.className = 'bg-white rounded-lg shadow-sm p-4 border-l-4 border-primary';
                statsCard.innerHTML = `
                    <h4 class="font-semibold text-primary">${course.name[currentLanguage]}</h4>
                    <div class="flex justify-between mt-3 text-sm">
                        <div class="text-center">
                            <p class="text-gray-600" data-i18n="teacherSummary.total">${translations[currentLanguage]['teacherSummary.total']}</p>
                            <p class="font-bold text-primary">${totalCapacity}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-gray-600" data-i18n="teacherSummary.booked">${translations[currentLanguage]['teacherSummary.booked']}</p>
                            <p class="font-bold text-secondary">${bookedCount}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-gray-600" data-i18n="teacherSummary.remaining">${translations[currentLanguage]['teacherSummary.remaining']}</p>
                            <p class="font-bold text-success">${remainingCount}</p>
                        </div>
                    </div>
                `;
                courseStatsContainer.appendChild(statsCard);
                
                // 渲染学员详情卡片
                const detailsCard = document.createElement('div');
                detailsCard.className = 'bg-white rounded-lg shadow-sm p-4';
                detailsCard.innerHTML = `
                    <h4 class="font-semibold text-primary mb-3">${course.name[currentLanguage]}</h4>
                    <div class="space-y-2">
                        ${courseBookings.length > 0 ? courseBookings.map(booking => `
                            <div class="flex justify-between items-center p-2 bg-gray-50 rounded">
                                <div>
                                    <p class="font-medium">张三</p>
                                    <p class="text-xs text-gray-500">${booking.date} - ${booking.status === 'confirmed' ? translations[currentLanguage]['bookings.confirmed'] : translations[currentLanguage]['bookings.leave']}</p>
                                </div>
                                <span class="px-2 py-1 text-xs rounded-full ${
                                    booking.status === 'confirmed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                                }">
                                    ${booking.status === 'confirmed' ? translations[currentLanguage]['bookings.confirmed'] : translations[currentLanguage]['bookings.leave']}
                                </span>
                            </div>
                        `).join('') : `
                            <div class="text-center py-3 text-gray-500" data-i18n="teacherSummary.noBookings">
                                ${translations[currentLanguage]['teacherSummary.noBookings']}
                            </div>
                        `}
                    </div>
                `;
                courseDetailsContainer.appendChild(detailsCard);
            });
        }
